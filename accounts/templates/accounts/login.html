{% extends "base.html" %} {% load socialaccount %} {% block content %}
<div class="min-h-screen flex items-center justify-center">
  <div class="glass p-8 rounded-xl w-full max-w-md">
    <h2 class="heading-md mb-6 text-center">Login</h2>

    <!-- EMAIL LOGIN -->
    <form method="POST">
      {% csrf_token %} {{ form.as_p }}
      <button class="btn-primary w-full mt-4">Login</button>
    </form>

    <!-- GOOGLE LOGIN -->
    <a
      href="{% provider_login_url 'google' %}"
      class="btn-secondary w-full mt-4 block text-center"
    >
      Continue with Google
    </a>
    <p class="text-muted mt-2 text-center">
      <a href="/accounts/password/reset/">Forgot Password?</a>
    </p>
    <p class="text-muted mt-4 text-center">
      Don't have an account?
      <a href="/accounts/signup/">Sign up</a>
    </p>
  </div>
</div>
{% endblock %}
