{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
  <div class="glass p-8 rounded-xl w-full max-w-md">

    <h2 class="heading-md mb-6 text-center">Set New Password</h2>

    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn-primary w-full mt-4">Reset Password</button>
    </form>

  </div>
</div>
{% endblock %}
