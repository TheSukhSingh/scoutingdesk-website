{% extends "base.html" %}
{% load socialaccount %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
  <div class="glass p-8 rounded-xl w-full max-w-md">

    <h2 class="heading-md mb-6 text-center">Sign Up</h2>

    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn-primary w-full mt-4">Sign Up</button>
    </form>

    <!-- GOOGLE -->
    <a href="{% provider_login_url 'google' %}" 
       class="btn-secondary w-full mt-4 block text-center">
       Continue with Google
    </a>

    <p class="text-muted mt-4 text-center">
      Already have an account?
      <a href="/accounts/login/">Login</a>
    </p>

  </div>
</div>
{% endblock %}
