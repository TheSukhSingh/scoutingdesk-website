{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
  <div class="glass p-8 rounded-xl w-full max-w-md">

    <h2 class="heading-md mb-6 text-center">Forgot Password</h2>

    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn-primary w-full mt-4">Send Reset Link</button>
    </form>

    <p class="text-muted mt-4 text-center">
      <a href="/accounts/login/">Back to Login</a>
    </p>

  </div>
</div>
{% endblock %}
