<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">

    <style>
        body {
            margin: 0;
            padding: 40px 0;
            background: #020a12;
            font-family: Arial, sans-serif;
        }

        .wrapper {
            max-width: 760px;
            margin: auto;
        }

        .card {
            background: #0b1722;
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 20px;
            overflow: hidden;
        }


        .logo {
            color: white;
            font-size: 30px;
            font-weight: 700;
        }

        .content {
            padding: 40px;
        }

        h1 {
            color: white;
            font-size: 30px;
            margin-top: 0;
            line-height: 1.3;
        }

        p {
            color: #94a3b8;
            line-height: 1.9;
            font-size: 15px;
        }

        .button {
            display: inline-block;
            padding: 15px 32px;
            border-radius: 12px;
            text-decoration: none;
            color: white !important;
            background: linear-gradient(135deg,
                    #3553d0,
                    #4266f5);
            font-weight: 600;
        }

        .info-box {
            background: rgba(255, 255, 255, .03);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 16px;
            padding: 22px;
            margin: 30px 0;
        }

        .footer {
            padding: 35px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, .08);
        }

        .footer p {
            font-size: 13px;
        }

        .header {
            padding: 40px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, .08);
        }

        .tagline {
            margin-top: 12px;
            color: #94a3b8;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="wrapper">

        <div class="card">

            <div class="header">

                <img src="https://scoutingdesk.com/static/images/email_logo_text.png" width="240"
                    style="display:block;margin:auto;">

                <div class="tagline">
                    Professional Football Scouting Software
                </div>

            </div>

            <div class="content">
                {% block content %}
                {% endblock %}
            </div>

            <div class="footer">

                <p>

                    This email was sent automatically by ScoutingDesk.

                    If you need assistance, contact us at support@scoutingdesk.com.

                </p>

            </div>

        </div>

    </div>

</body>

</html>
