<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
body{
    margin:0;
    padding:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

.container{
    max-width:600px;
    margin:40px auto;
    background:#ffffff;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 5px 25px rgba(0,0,0,.08);
}

.header{
    background:#e30613;
    padding:30px;
    text-align:center;
}

.logo{
    color:white;
    font-size:28px;
    font-weight:700;
}

.content{
    padding:40px;
    color:#111827;
    line-height:1.8;
}

.button{
    display:inline-block;
    padding:14px 28px;
    background:#e30613;
    color:white !important;
    text-decoration:none;
    border-radius:10px;
    font-weight:600;
}

.card{
    background:#fafafa;
    border:1px solid #eeeeee;
    padding:20px;
    border-radius:12px;
    margin:20px 0;
}

.footer{
    padding:30px;
    background:#fafafa;
    text-align:center;
    color:#777;
    font-size:14px;
}
</style>

</head>

<body>

<div class="container">

    <div class="header">
        <div class="logo">
            SCOUTINGDESK
        </div>
    </div>

    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

    <div class="footer">
        Need help?<br>
        support@scoutingdesk.com
    </div>

</div>

</body>
</html>
