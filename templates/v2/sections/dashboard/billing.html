<div>

    <div class="mb-10">

        <h1 class="text-4xl font-medium">
            Billing
        </h1>

        <p class="text-zinc-400 mt-2">
            View your payment history and purchases.
        </p>

    </div>



    <!-- SUMMARY -->
    <div
        id="billing-summary"
        class="grid grid-cols-4 gap-6 mb-10"
    >
    </div>



    <!-- TABLE -->
    <div class="border border-zinc-800 rounded-2xl overflow-hidden">

        <table class="w-full">

            <thead class="bg-zinc-900">

                <tr>

                    <th class="text-left p-5">
                        Package
                    </th>

                    <th class="text-left p-5">
                        Amount
                    </th>

                    <th class="text-left p-5">
                        Status
                    </th>

                    <th class="text-left p-5">
                        Date
                    </th>

                    <th class="text-left p-5">
                        Session
                    </th>

                </tr>

            </thead>

            <tbody
                id="billing-table-body"
            >
            </tbody>

        </table>

    </div>

</div>



<script>

async function loadBilling() {

    const response = await fetch(
        "/payments/billing-history/"
    )

    const data = await response.json()



    // SUMMARY
    document.getElementById(
        "billing-summary"
    ).innerHTML = `

        <div class="border border-zinc-800 rounded-2xl p-6">
            <p class="text-zinc-400 mb-2">
                Total Purchases
            </p>

            <h2 class="text-3xl font-bold">
                ${data.summary.total_orders}
            </h2>
        </div>



        <div class="border border-zinc-800 rounded-2xl p-6">
            <p class="text-zinc-400 mb-2">
                Successful Payments
            </p>

            <h2 class="text-3xl font-bold text-green-400">
                ${data.summary.successful_payments}
            </h2>
        </div>



        <div class="border border-zinc-800 rounded-2xl p-6">
            <p class="text-zinc-400 mb-2">
                Failed Payments
            </p>

            <h2 class="text-3xl font-bold text-red-400">
                ${data.summary.failed_payments}
            </h2>
        </div>



        <div class="border border-zinc-800 rounded-2xl p-6">
            <p class="text-zinc-400 mb-2">
                Total Spent
            </p>

            <h2 class="text-3xl font-bold">
                $${data.summary.total_spent}
            </h2>
        </div>
    `



    // TABLE
    const tableBody =
        document.getElementById(
            "billing-table-body"
        )

    tableBody.innerHTML = ""



    if (!data.orders.length) {

        tableBody.innerHTML = `
            <tr>
                <td
                    colspan="5"
                    class="p-10 text-center text-zinc-500"
                >
                    No payment history found.
                </td>
            </tr>
        `

        return
    }



    data.orders.forEach(order => {

        tableBody.innerHTML += `

            <tr class="border-t border-zinc-800">

                <td class="p-5 capitalize">
                    ${order.package}
                </td>



                <td class="p-5">
                    $${order.amount}
                </td>



                <td class="p-5">

                    <span class="${
                        order.status === "paid"
                        ? "text-green-400"
                        : order.status === "failed"
                        ? "text-red-400"
                        : "text-yellow-400"
                    }">

                        ${order.status}

                    </span>

                </td>



                <td class="p-5">
                    ${
                        new Date(
                            order.created_at
                        ).toLocaleString()
                    }
                </td>



                <td class="p-5 text-zinc-500 text-sm">
                    ${order.session_id}
                </td>

            </tr>
        `
    })
}



loadBilling()

</script>
