<div class="licenses-page">

    <!-- HEADER -->
    <div class="flex items-start justify-between gap-6 mb-8 flex-wrap">

        <div>
            <h1 class="text-4xl font-medium leading-tight">
                Licenses
            </h1>

            <p class="text-zinc-400 mt-3 text-lg">
                Manage your ScoutingDesk licenses and devices.
            </p>
        </div>

    </div>



    <!-- TOOLBAR -->
    <div class="licenses-toolbar mb-6">

        <!-- SEARCH -->
        <div class="licenses-search-wrap">

            <input type="text" id="license-search" placeholder="Search activation keys..."
                class="licenses-search-input">

        </div>



        <!-- FILTERS -->
        <div class="licenses-filters">

            <select id="package-filter" class="licenses-select">
                <option value="all">All Packages</option>
                <option value="club">Club</option>
                <option value="agency">Agency</option>
                <option value="player">Player</option>
            </select>

            <select id="status-filter" class="licenses-select">
                <option value="all">All Status</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
            </select>

        </div>

    </div>



    <!-- TABLE -->
    <div class="licenses-table-wrap">

        <div class="overflow-x-auto">

            <table class="licenses-table">

                <thead>

                    <tr>

                        <th>Package</th>
                        <th>Activation Key</th>
                        <th>Status</th>
                        <th>Device</th>
                        <th>Created</th>
                        <th>Last Seen</th>
                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="licenses-container">

                </tbody>

            </table>

        </div>

    </div>



    <!-- PAGINATION -->
    <div class="licenses-pagination">

        <button id="prev-page" class="pagination-btn">
            Previous
        </button>

        <div id="pagination-info" class="text-zinc-400 text-sm">
            Page 1
        </div>

        <button id="next-page" class="pagination-btn">
            Next
        </button>

    </div>
    <div id="toast-container"></div>
</div>



<!-- =========================================================
     MODAL
========================================================= -->

<div id="modal-overlay" class="custom-modal-overlay modal-hidden">

    <div class="custom-modal">

        <div class="custom-modal-top">

            <h3 id="modal-title">
                Confirm Action
            </h3>

            <button onclick="closeModal()" class="custom-modal-close">

                ✕

            </button>

        </div>



        <p id="modal-description" class="custom-modal-description">

        </p>



        <!-- CONFIRM INPUT -->
        <div id="confirm-input-wrap" class="modal-hidden mt-5">

            <label class="block text-sm text-zinc-400 mb-2">
                Type "confirm" to continue
            </label>

            <input type="text" id="confirm-input" class="confirm-input" placeholder="confirm">

        </div>



        <div class="custom-modal-actions">

            <button onclick="closeModal()" class="modal-btn secondary">

                Cancel

            </button>

            <button id="modal-confirm-btn" class="modal-btn primary">

                Continue

            </button>

        </div>

    </div>

</div>



<style>
    /* =========================================================
       TOOLBAR
    ========================================================= */

        flex: 1;

    }

        position: absolute;

        left: 16px;

    .licenses-search-input {

        height: 52px;

        padding-left: 48px;

        background:
            linear-gradient(to bottom,
                rgba(255, 255, 255, 0.04),
                rgba(255, 255, 255, 0.02));

        box-shadow:
            0 0 0 4px rgba(71, 123, 255, 0.08);
    }

        display: flex;

        gap: 0.8rem;

        flex-wrap: wrap;
    }

    .licenses-select {

        height: 52px;

        padding: 0 1rem;

        border-radius: 16px;

        background:
            linear-gradient(to bottom,
                rgba(255, 255, 255, 0.04),
                rgba(255, 255, 255, 0.02));

        border: 1px solid rgba(255, 255, 255, 0.08);

        color: white;

        min-width: 170px;

        background: #0f172a;

    }



    /* =========================================================
       TABLE
    ========================================================= */

    .licenses-table-wrap {

        overflow: hidden;

        border-radius: 28px;

        background:
            linear-gradient(to bottom,
                rgba(255, 255, 255, 0.035),
                rgba(255, 255, 255, 0.015));

        padding: 1.2rem 1.4rem;

    }

    .licenses-table td {

    /* =========================================================

    }



    /* =========================================================
       SMALL TEXT
    ========================================================= */

    .license-small-text {

        font-size: 0.82rem;

        color: #cbd5e1;

        line-height: 1.7;
    }

    .license-muted-text {

        font-size: 0.8rem;

        color: #64748b;

        margin-top: 0.35rem;

        line-height: 1.6;
    }


    /* =========================================================
   INLINE ACTIONS
========================================================= */

    .license-actions-inline {

        display: flex;

        align-items: center;

        gap: 0.65rem;

        flex-wrap: nowrap;
    }



    /* BUTTON */

    .license-btn {

        height: 38px;

        padding: 0 0.9rem;

        border-radius: 12px;

        font-size: 0.78rem;

        font-weight: 500;

        white-space: nowrap;

        transition: all 0.25s ease;
    }



    /* RESET */

    .license-btn.secondary {

        background:
            rgba(255, 255, 255, 0.03);

        border:
            1px solid rgba(255, 255, 255, 0.08);

        color: white;
    }

    .license-btn.secondary:hover {

        background:
            rgba(255, 255, 255, 0.06);
    }



    /* REGENERATE */

    .license-btn.danger {

        background:
            rgba(239, 68, 68, 0.07);

        border:
            1px solid rgba(239, 68, 68, 0.14);

    }

    .license-btn.danger:hover {

        background:
            rgba(239, 68, 68, 0.12);

    /* =========================================================
       PAGINATION
    ========================================================= */

    .licenses-pagination {

        align-items: center;

    }

        padding: 0 1.25rem;

    .pagination-btn:hover {

            rgba(255, 255, 255, 0.06);

    /* =========================================================
       MODAL
    ========================================================= */

    .custom-modal-overlay {

        position: fixed;

        inset: 0;

        background:
            rgba(2, 10, 18, 0.78);

        backdrop-filter: blur(10px);

        display: flex;

        align-items: center;

        justify-content: center;

        z-index: 9999;

        padding: 1rem;
    }

    .custom-modal {

        width: 100%;

        max-width: 520px;

        border-radius: 28px;

        background:
            linear-gradient(to bottom,
                rgba(11, 23, 34, 0.98),
                rgba(6, 13, 20, 0.98));

        border:
            1px solid rgba(255, 255, 255, 0.08);

        padding: 1.8rem;
    }

    .custom-modal-top {

        display: flex;

        align-items: center;

        justify-content: space-between;
    }

    .custom-modal-top h3 {

        font-size: 1.4rem;

        font-weight: 600;
    }

    .custom-modal-close {

        width: 40px;
        height: 40px;

        border-radius: 12px;

        background:
            rgba(255, 255, 255, 0.03);

        border:
            1px solid rgba(255, 255, 255, 0.08);
    }

    .custom-modal-description {

        margin-top: 1rem;

        color: #94a3b8;

        line-height: 1.8;
    }

    .custom-modal-actions {

        display: flex;

        justify-content: flex-end;

        gap: 0.8rem;

        margin-top: 2rem;
    }

    .modal-btn {

        height: 48px;

        padding: 0 1.2rem;

        border-radius: 14px;
    }

    .modal-btn.secondary {

        background:
            rgba(255, 255, 255, 0.03);

        border:
            1px solid rgba(255, 255, 255, 0.08);
    }

    .modal-btn.primary {

        background:
            linear-gradient(135deg,
                #3553d0,
                #4266f5);
    }

    .confirm-input {

        width: 100%;

        height: 52px;

        padding: 0 1rem;

        border-radius: 16px;

        background:
            rgba(255, 255, 255, 0.03);

        border:
            1px solid rgba(255, 255, 255, 0.08);

        color: white;

        outline: none;
    }

    .modal-hidden {
        display: none;
    }
</style>



<script>



    let allLicenses = []

    let currentPage = 1

    let currentAction = null

    let currentKey = null



    async function loadLicenses() {

        const response = await fetch(
            `/api/license/my-licenses/?page=${currentPage}`
        )

        const data = await response.json()

        allLicenses = data.licenses

        window.paginationData = data.pagination

        renderLicenses()
    }



  function renderLicenses() {

        const container =
            document.getElementById(
                "licenses-container"
            )

        const search =
            document.getElementById(
                "license-search"
            ).value.toLowerCase()

        const packageFilter =
            document.getElementById(
                "package-filter"
            ).value

        const statusFilter =
            document.getElementById(
                "status-filter"
            ).value



        let filtered =
            allLicenses.filter(license => {

                const matchesSearch =
                    license.key.toLowerCase()
                        .includes(search)

                const matchesPackage =
                    packageFilter === "all"
                    || license.package.toLowerCase()
                    === packageFilter

                const matchesStatus =
                    statusFilter === "all"
                    || (
                        statusFilter === "active"
                            ? license.is_active
                            : !license.is_active
                    )

                return (
                    matchesSearch
                    && matchesPackage
                    && matchesStatus
                )
            })







        container.innerHTML = ""



        filtered.forEach(license => {

            container.innerHTML += `

                <tr>

                    <td>

                        <div class="font-semibold capitalize text-white">
                            ${license.package}
                        </div>

                    </td>



                    <td>

                        <div
                            class="license-key"
                            onclick="copyKey('${license.key}')">

                            ${license.key}

                        </div>

                    </td>



                    <td>

                        <div class="
                            license-status
                            ${license.is_active
                    ? 'active'
                    : 'inactive'}
                        ">
                            ${license.is_active
                    ? 'Active'
                    : 'Inactive'}
                        </div>

                    </td>



                    <td>

                        <div class="license-small-text">

                            ${license.device_bound
                    ? 'Connected'
                    : 'Not Connected'}

                        </div>

                    </td>



                    <td>

                        <div class="license-small-text">

                            ${new Date(
                        license.created_at
                    ).toLocaleDateString()}

                        </div>

                    </td>



                    <td>

                        <div class="license-small-text">

                            ${license.last_seen
                    ? new Date(
                        license.last_seen
                    ).toLocaleDateString()
                    : '-'}

                        </div>

                    </td>



                  <td>

    <div class="license-actions-inline">

        <button
            onclick="openResetModal('${license.key}')"
            class="license-btn secondary">

            Reset

        </button>



        <button
            onclick="openRegenerateModal('${license.key}')"
            class="license-btn danger">

            Regenerate

        </button>

    </div>

</td>

                </tr>

            `
        })



        document.getElementById(
            "pagination-info"
        ).innerText =
           `Page ${paginationData.current_page} of ${paginationData.total_pages || 1}`
    }



    function copyKey(key) {

        const cleaned =
            key.replace(/^SD-/, '')

        navigator.clipboard.writeText(
            cleaned
        )
    }



    /* =========================================================
       MODALS
    ========================================================= */

    function openResetModal(key) {

        currentAction = "reset"

        currentKey = key

        document.getElementById(
            "modal-title"
        ).innerText =
            "Reset Device?"

        document.getElementById(
            "modal-description"
        ).innerText =
            "This will unlink the currently connected device from this license key. You can only reset once every 7 days."

        document.getElementById(
            "confirm-input-wrap"
        ).classList.add("modal-hidden")

        document.getElementById(
            "modal-overlay"
        ).classList.remove("modal-hidden")
    }



    function openRegenerateModal(key) {

        currentAction = "regenerate"

        currentKey = key

        document.getElementById(
            "modal-title"
        ).innerText =
            "Regenerate License Key?"

        document.getElementById(
            "modal-description"
        ).innerText =
            "This will permanently delete the current activation key and generate a completely new one. Use this only if the key was leaked or compromised. Cooldown: 30 days."

        document.getElementById(
            "confirm-input-wrap"
        ).classList.remove("modal-hidden")

        document.getElementById(
            "modal-overlay"
        ).classList.remove("modal-hidden")
    }



    function closeModal() {

        document.getElementById(
            "modal-overlay"
        ).classList.add("modal-hidden")

        document.getElementById(
            "confirm-input"
        ).value = ""
    }



    document.getElementById(
        "modal-confirm-btn"
    ).addEventListener(
        "click",
        async () => {

            if (
                currentAction === "regenerate"
            ) {

                const value =
                    document.getElementById(
                        "confirm-input"
                    ).value.trim()

                if (value !== "confirm") {

                    alert(
                        'Please type "confirm"'
                    )

                    return
                }

                await regenerateKey(
                    currentKey
                )

            } else {

                await resetDevice(
                    currentKey
                )
            }

            closeModal()
        }
    )



    async function resetDevice(key) {

        const response = await fetch(
            "/api/license/reset-device/",
            {
                method: "POST",

                headers: {
                    "Content-Type":
                        "application/json",

                    "X-CSRFToken":
                        "{{ csrf_token }}"
                },

                body: JSON.stringify({
                    activation_key: key
                })
            }
        )

        const data =
            await response.json()

        if (data.success) {

            showToast(
                "success",
                "Device Reset",
                "Device unlink request completed successfully."
            )

            loadLicenses()

        } else {

            showToast(
                "error",
                "Reset Failed",
                data.error || "Something went wrong."
            )
        }
    }

    async function regenerateKey(key) {

        const response = await fetch(
            "/api/license/regenerate-key/",
            {
                method: "POST",

                headers: {
                    "Content-Type":
                        "application/json",

                    "X-CSRFToken":
                        "{{ csrf_token }}"
                },

                body: JSON.stringify({
                    activation_key: key
                })
            }
        )

        const data =
            await response.json()

        if (data.success) {

            showToast(
                "success",
                "Key Regenerated",
                "A new activation key was generated successfully."
            )

            loadLicenses()

        } else {

            showToast(
                "error",
                "Regeneration Failed",
                data.error || "Something went wrong."
            )
        }
    }

    /* =========================================================
       FILTERS
    ========================================================= */

document.getElementById(
    "license-search"
).addEventListener(
    "input",
    () => {

        currentPage = 1

        renderLicenses()
    }
)
document.getElementById(
    "package-filter"
).addEventListener(
    "change",
    renderLicenses
)

document.getElementById(
    "status-filter"
).addEventListener(
    "change",
    renderLicenses
)



  document.getElementById(
    "prev-page"
).addEventListener(
    "click",
    () => {

        if (paginationData.has_previous) {

            currentPage--

            loadLicenses()
        }
    }
)

document.getElementById(
    "next-page"
).addEventListener(
    "click",
    () => {

        if (paginationData.has_next) {

            currentPage++

            loadLicenses()
        }
    }
)



    loadLicenses()

</script>
