<div class="space-y-10">

    <!-- PROFILE INFO -->
    <div class="border border-zinc-800 rounded-2xl p-6">
        <h2 class="text-2xl font-semibold mb-6">
            Profile Information
        </h2>

        <form id="profile-form" class="space-y-5">

            <div>
                <label class="block mb-2 text-sm text-zinc-400">
                    First Name
                </label>

                <input
                    type="text"
                    id="first_name"
                    class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3"
                >
            </div>

            <div>
                <label class="block mb-2 text-sm text-zinc-400">
                    Last Name
                </label>

                <input
                    type="text"
                    id="last_name"
                    class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3"
                >
            </div>

            <div>
                <label class="block mb-2 text-sm text-zinc-400">
                    Email
                </label>

                <input
                    type="email"
                    id="email"
                    disabled
                    class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 opacity-70"
                >
            </div>

            <div>
                <label class="block mb-2 text-sm text-zinc-400">
                    Club (Optional)
                </label>

                <input
                    type="text"
                    id="club"
                    class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3"
                >
            </div>

            <div>
                <label class="block mb-2 text-sm text-zinc-400">
                    Role (Optional)
                </label>

                <input
                    type="text"
                    id="role"
                    class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3"
                >
            </div>

            <button
                type="submit"
                class="bg-white text-black px-5 py-3 rounded-xl font-medium"
            >
                Save Changes
            </button>

        </form>
    </div>


    <!-- SECURITY -->
    <div class="border border-zinc-800 rounded-2xl p-6">

        <h2 class="text-2xl font-semibold mb-6">
            Security
        </h2>

        <div class="space-y-5">

            <div>
                <p class="text-zinc-400 text-sm mb-1">
                    Password
                </p>

                <a
                    href="/accounts/password/change/"
                    class="inline-flex bg-zinc-800 hover:bg-zinc-700 transition px-4 py-2 rounded-xl"
                >
                    Change Password
                </a>
            </div>

            <div>
                <p class="text-zinc-400 text-sm mb-1">
                    Account Created
                </p>

                <p id="created_at">
                    -
                </p>
            </div>

            <div>
                <p class="text-zinc-400 text-sm mb-1">
                    Active Device
                </p>

                <p id="device_status">
                    -
                </p>
            </div>

            <div>
                <p class="text-zinc-400 text-sm mb-1">
                    Last Seen
                </p>

                <p id="last_seen">
                    -
                </p>
            </div>

        </div>

    </div>

</div>

<script>

async function loadProfileData() {

    const response = await fetch("/api/profile/")

    const data = await response.json()

    document.getElementById("first_name").value = data.first_name || ""
    document.getElementById("last_name").value = data.last_name || ""

    document.getElementById("email").value = data.email || ""

    document.getElementById("club").value = data.club || ""
    document.getElementById("role").value = data.role || ""

    document.getElementById("created_at").innerText =
        new Date(data.created_at).toLocaleString()

    document.getElementById("device_status").innerText =
        data.device_active ? "Active" : "No Device"

    document.getElementById("last_seen").innerText =
        data.last_seen
            ? new Date(data.last_seen).toLocaleString()
            : "-"
}

loadProfileData()



document
.getElementById("profile-form")
.addEventListener("submit", async function(e) {

    e.preventDefault()

    const response = await fetch("/api/profile/update/", {
        method: "POST",

        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}"
        },

        body: JSON.stringify({
            first_name: document.getElementById("first_name").value,
            last_name: document.getElementById("last_name").value,

            club: document.getElementById("club").value,
            role: document.getElementById("role").value,
        })
    })

    const data = await response.json()

    if (data.success) {
        alert("Profile updated")
    } else {
        alert(data.error || "Something went wrong")
    }

})

</script>
