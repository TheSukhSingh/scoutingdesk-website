<div class="profile-page space-y-8">

    <!-- PROFILE -->
    <div class="licenses-table-wrap p-7">

        <div class="mb-8">

            <h2 class="text-3xl font-semibold">
                Profile Information
            </h2>

            <p class="text-zinc-400 mt-2">
                Manage your account details and profile information.
            </p>

        </div>



        <form id="profile-form" class="space-y-6">

            <!-- GRID -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <!-- FIRST NAME -->
                <div>

                    <label class="profile-label">
                        First Name
                    </label>

                    <input type="text" id="first_name" class="profile-input">

                </div>



                <!-- LAST NAME -->
                <div>

                    <label class="profile-label">
                        Last Name
                    </label>

                    <input type="text" id="last_name" class="profile-input">

                </div>



                <!-- EMAIL -->
                <div class="md:col-span-2">

                    <label class="profile-label">
                        Email Address
                    </label>

                    <input type="email" id="email" disabled class="profile-input disabled-input">

                </div>



                <!-- CLUB -->
                <div>

                    <label class="profile-label">
                        Club (Optional)
                    </label>

                    <input type="text" id="club" class="profile-input">

                </div>



                <!-- ROLE -->
                <div>

                    <label class="profile-label">
                        Role (Optional)
                    </label>

                    <input type="text" id="role" class="profile-input">

                </div>

            </div>



            <!-- ACTION -->
            <div class="pt-2">

                <button type="submit" class="profile-save-btn">

                    Save Changes

                </button>

            </div>

        </form>

    </div>



    <!-- SECURITY -->
    <div class="licenses-table-wrap p-7">

        <div class="mb-8">

            <h2 class="text-3xl font-semibold">
                Security
            </h2>

            <p class="text-zinc-400 mt-2">
                Review account activity and security settings.
            </p>

        </div>


        <!-- SECURITY GRID -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

            <!-- PASSWORD -->
            <div class="profile-security-card">

                <p class="profile-security-label">
                    Password
                </p>

                <a href="/accounts/password/change/" class="profile-security-btn">

                    Change Password

                </a>

            </div>



            <!-- CREATED -->
            <div class="profile-security-card">

                <p class="profile-security-label">
                    Account Created
                </p>

                <p id="created_at" class="profile-security-value">

                    -

                </p>

            </div>

        </div>

    </div>

</div>



<style>
    .profile-label {

        display: block;

        margin-bottom: 0.8rem;

        font-size: 0.9rem;

        color: #94a3b8;

        font-weight: 500;
    }



    .profile-input {

        width: 100%;

        height: 54px;

        padding: 0 1rem;

        border-radius: 16px;

        background:
            linear-gradient(to bottom,
                rgba(255, 255, 255, 0.04),
                rgba(255, 255, 255, 0.02));

        border:
            1px solid rgba(255, 255, 255, 0.08);

        color: white;

        outline: none;

        transition: all 0.25s ease;

        backdrop-filter: blur(10px);
    }



    .profile-input:focus {

        border-color:
            rgba(71, 123, 255, 0.35);

        box-shadow:
            0 0 0 4px rgba(71, 123, 255, 0.08);
    }



    .disabled-input {

        opacity: 0.7;

        cursor: not-allowed;
    }



    .profile-save-btn {

        height: 52px;

        padding: 0 1.4rem;

        border-radius: 16px;

        background:
            linear-gradient(135deg,
                #3553d0,
                #4266f5);

        color: white;

        font-weight: 500;

        transition: all 0.25s ease;
    }



    .profile-save-btn:hover {

        transform: translateY(-1px);

        opacity: 0.95;
    }



    /* =========================================================
   SECURITY
========================================================= */

    .profile-security-card {

        padding: 1.4rem;

        border-radius: 22px;

        background:
            rgba(255, 255, 255, 0.025);

        border:
            1px solid rgba(255, 255, 255, 0.06);
    }



    .profile-security-label {

        font-size: 0.85rem;

        color: #94a3b8;

        margin-bottom: 0.8rem;
    }



    .profile-security-value {

        font-size: 1rem;

        color: white;

        line-height: 1.7;
    }



    .profile-security-btn {

        display: inline-flex;

        align-items: center;

        justify-content: center;

        height: 42px;

        padding: 0 1rem;

        border-radius: 12px;

        background:
            rgba(255, 255, 255, 0.04);

        border:
            1px solid rgba(255, 255, 255, 0.08);

        transition: all 0.25s ease;
    }



    .profile-security-btn:hover {

        background:
            rgba(255, 255, 255, 0.07);
    }



    /* =========================================================
   MOBILE
========================================================= */

    @media (max-width: 768px) {

        .licenses-table-wrap {

            padding: 1.2rem !important;
        }

    }
</style>



<script>

    async function loadProfileData() {

        const response = await fetch(
            "/api/profile/"
        )

        const data = await response.json()



        document.getElementById(
            "first_name"
        ).value =
            data.first_name || ""



        document.getElementById(
            "last_name"
        ).value =
            data.last_name || ""



        document.getElementById(
            "email"
        ).value =
            data.email || ""



        document.getElementById(
            "club"
        ).value =
            data.club || ""



        document.getElementById(
            "role"
        ).value =
            data.role || ""



        document.getElementById(
            "created_at"
        ).innerText =
            new Date(
                data.created_at
            ).toLocaleDateString()



    }



    loadProfileData()



    document
        .getElementById(
            "profile-form"
        )
        .addEventListener(
            "submit",
            async function (e) {

                e.preventDefault()



                const response = await fetch(
                    "/api/profile/update/",
                    {
                        method: "POST",

                        headers: {
                            "Content-Type":
                                "application/json",

                            "X-CSRFToken":
                                "{{ csrf_token }}"
                        },

                        body: JSON.stringify({

                            first_name:
                                document.getElementById(
                                    "first_name"
                                ).value,

                            last_name:
                                document.getElementById(
                                    "last_name"
                                ).value,

                            club:
                                document.getElementById(
                                    "club"
                                ).value,

                            role:
                                document.getElementById(
                                    "role"
                                ).value,
                        })
                    }
                )



                const data =
                    await response.json()



                if (data.success) {

                    showToast(
                        "success",
                        "Profile Updated",
                        "Your profile information was updated successfully."
                    )

                } else {

                    showToast(
                        "error",
                        "Update Failed",
                        data.error || "Something went wrong."
                    )
                }
            }
        )

</script>
